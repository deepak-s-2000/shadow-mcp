name: Release

# Builds cross-platform binaries (via the Makefile's `cross` target, the same
# one used for local cross-builds) and publishes them as downloadable assets
# on a GitHub Release whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build cross-platform binaries
        run: make cross

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
